<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Daily Meal Planner</title>
        <h1>Todays Menu</h1>
        <link rel="stylesheet" href="planner.css">
    </head>
    <body>
        <ul id="mealList">
            <li>Oats or whole-grain porridge <button class="remove-btn">-</button></li><br>
            <li>Brown rice, quinoa, or whole-wheat chapati <button class="remove-btn">-</button></li><br>
            <li>Steamed or sauteed vegetables-broccoli, zucchini, cauliflower <button class="remove-btn">-</button></li><br>    
        </ul>
        <input type="text" id="mealInput" placeholder="Add extra items" autocomplete="off">
        <button id="addbtn">Add items</button> <br>
       <script src="planner.js"></script>
    </body>
</html>
