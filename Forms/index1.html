<!DOCTYPE html>
<html>
    <head>
        <title>Contact info forms</title>
    </head>
    <body>
        <h1>Contact information</h1>
        <link rel="stylesheet" href="style.css">

    <div>
        <!-------Name field-->
        <label for="Name">Name:</label>
        <input type="Name" id="name" name="name"><br><br>
       
        <!-----email field-->
        <label for="Email">Email:</label>
        <input type="email" id="email" name="email"><br><br>

        <!---------Message field-->
        <label for="Message">Message:</label><br>
        <textarea id="Message" name="Message" rows="5" cols="40"></textarea><br><br>
        
          <p>Gender:</p>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <input type="radio" id="transgender" name="gender" value="transgender">
        <label for="transgender">Trangender</label>

    <!---Languages known-->
    <p>Languages known</p>
    <input type="checkbox" id="Tamil" name="Languages" value="Tamil">
    <label for="tamil">Tamil</label>
    <input type="checkbox" id="English" name="Language" value="English">
    <label for="English">English</label>
    <input type="checkbox" id="Hindi" name="Language" value="Hindi">
    <label for="Hindi">Hindi</label><br><br>
<button>Submit</button>
    </div>
    </body>
</html>
